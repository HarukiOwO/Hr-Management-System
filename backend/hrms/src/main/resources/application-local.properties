# HRMS Backend - Local Profile Configuration (using H2 database with MySQL compatibility mode)
spring.application.name=hrms-backend
server.port=8080

# H2 Database in MySQL Mode (saves to ./data/hrms_db file inside the project directory so data is preserved across restarts)
spring.datasource.url=jdbc:h2:file:./data/hrms_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Azure Active Directory (SSO) - DISABLED until real values are added
spring.cloud.azure.active-directory.enabled=false

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=xxxxxxxxxxxxxxxxxxxxxxx
spring.mail.password=xxxxxxxxxxxxxxx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# OTP Expiry (minutes)
app.otp.expiry=10
